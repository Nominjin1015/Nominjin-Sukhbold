<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: yellow;
        }
        section {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my personal page</p>
</header>

<nav>
    <a href="#about">About Me</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</nav>

<section id="about">
    <div class="card">
        <h2>About Me</h2>
        <p>Hello! My name is [Your Name]. I am a student interested in web development.</p>
    </div>
</section>

<section id="projects">
    <div class="card">
        <h2>My Projects</h2>
        <ul>
            <li>Project 1 – Description</li>
            <li>Project 2 – Description</li>
        </ul>
    </div>
</section>

<section id="contact">
    <div class="card">
        <h2>Contact</h2>
        <p>Email: your@email.com</p>
    </div>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
